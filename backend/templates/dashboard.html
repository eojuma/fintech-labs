<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FinTech Labs | Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🏦 FinTech Dashboard</h1>
            <a href="/logout" style="background: #dc3545; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px;">Logout</a>
        </div>
        
        <div class="card balance-card">
            <h2>Welcome back, {{.User.Username}}!</h2>
            <div class="balance-amount">KES {{.Balance}}</div>
            <p>Account Number: {{.Number}}</p>
            <p>Status: {{if .Active}}✅ Active{{else}}❌ Inactive{{end}}</p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>💰 Deposit Money</h3>
                <form action="/deposit" method="POST">
                    <input type="number" name="amount" placeholder="Amount (Min: 50, Max: 250,000)" required>
                    <button type="submit" class="btn-deposit">Confirm Deposit</button>
                </form>
            </div>

            <div class="card">
                <h3>💸 Withdraw Money</h3>
                <form action="/withdraw" method="POST">
                    <input type="number" name="amount" placeholder="Amount (Min: 100, Max: 40,000)" required>
                    <button type="submit" class="btn-withdraw">Confirm Withdrawal</button>
                </form>
            </div>
        </div>

        <div class="card">
            <h3>📊 Recent Transactions</h3>
            <div id="transactions">
                <p>Loading transactions...</p>
            </div>
        </div>
    </div>

    <script>
        // Fetch and display transactions
        async function loadTransactions() {
            try {
                const response = await fetch('/transactions');
                const transactions = await response.json();
                
                const container = document.getElementById('transactions');
                if (transactions.length === 0) {
                    container.innerHTML = '<p>No transactions yet. Make a deposit to get started!</p>';
                    return;
                }
                
                let html = '<table style="width: 100%; border-collapse: collapse;">';
                html += '<tr style="background: #f8f9fa;"><th style="padding: 10px; text-align: left;">Date</th><th style="padding: 10px; text-align: left;">Type</th><th style="padding: 10px; text-align: right;">Amount</th><th style="padding: 10px; text-align: right;">Balance</th></tr>';
                
                transactions.forEach(tx => {
                    const date = new Date(tx.CreatedAt).toLocaleString();
                    const amountColor = tx.Type === 'deposit' ? '#2ecc71' : '#e74c3c';
                    html += `<tr>
                        <td style="padding: 10px;">${date}</td>
                        <td style="padding: 10px; text-transform: capitalize;">${tx.Type}</td>
                        <td style="padding: 10px; text-align: right; color: ${amountColor};">${tx.Type === 'deposit' ? '+' : '-'} KES ${tx.Amount}</td>
                        <td style="padding: 10px; text-align: right;">KES ${tx.Balance}</td>
                    </tr>`;
                });
                html += '</table>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactions').innerHTML = '<p>Error loading transactions. Please refresh the page.</p>';
            }
        }
        
        // Load transactions when page loads
        loadTransactions();
        
        // Refresh transactions every 30 seconds
        setInterval(loadTransactions, 30000);
    </script>
</body>
</html>
