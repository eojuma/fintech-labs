<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Evans Bank</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="admin-body">
    <div class="admin-header-bg">
        <div class="container header">
            <h1>🏦 Admin Control Panel</h1>
            <div class="admin-nav">
                <a href="/dashboard" class="btn-secondary">Back to Dashboard</a>
                <form action="/logout" method="POST" style="display: inline;">
                    <button type="submit" class="btn-logout-small">Logout</button>
                </form>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <p class="stat-number">{{.TotalUsers}}</p>
            </div>
            <div class="stat-card">
                <h3>Total Deposits</h3>
                <p class="stat-number text-success">KES {{.TotalDeposits}}</p>
            </div>
        </div>

        <div class="card">
            <h3>User Management</h3>
            <table>
                <thead>
                    <tr>
                        <th>Account #</th>
                        <th>Username</th>
                        <th>Balance</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .Users}}
                    <tr>
                        <td><code>{{.AccountNumber}}</code></td>
                        <td>{{.Username}}</td>
                        <td>KES {{.Balance}}</td>
                        <td>
                            <button onclick="openModal('deposit', '{{.AccountNumber}}')" class="btn-action btn-deposit-small">Deposit</button>
                            <button onclick="openModal('withdraw', '{{.AccountNumber}}')" class="btn-action btn-withdraw-small">Withdraw</button>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content card">
            <h3 id="modalTitle">Account Action</h3>
            <form id="quickActionForm" method="POST">
                <input type="hidden" id="accountNumber" name="account_number">
                <div class="form-group">
                    <label for="amount">Amount (KES)</label>
                    <input type="number" id="amount" name="amount" required min="1">
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-deposit">Confirm Action</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
