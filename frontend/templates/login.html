<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Evans Bank</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
    <div class="bg-bubble" style="width: 80px; height: 80px; top: 10%; left: 10%;"></div>
    <div class="bg-bubble" style="width: 120px; height: 120px; bottom: 15%; right: 10%; animation-delay: 2s;"></div>

    <div class="auth-container">
        <div class="auth-header">
            <h2>🏦 Evans Bank</h2>
            <p>Secure Digital Banking</p>
        </div>
        <div class="card" style="box-shadow: none; margin-bottom: 0;">
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required placeholder="••••••••">
                        <span class="password-toggle" onclick="togglePassword('password', this)">👁️‍🗨️</span>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="btn-deposit">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                New here? <a href="/register" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create Account</a>
            </p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
