<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Evans Bank</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h2>🏦 Create Account</h2>
            <p>Join Evans Bank Today</p>
        </div>
        <div class="card" style="box-shadow: none; margin-bottom: 0;">
            <form id="registerForm" action="/register" method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" id="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" name="password" id="password" required placeholder="Create strong password">
                        <span class="password-toggle" onclick="togglePassword('password', this)">👁️‍🗨️</span>
                    </div>
                </div>
                <button type="submit" id="registerBtn" class="btn-deposit">Register</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Already have an account? <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login</a>
            </p>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
